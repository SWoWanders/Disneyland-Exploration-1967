<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disneyland — June 17, 1967</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Courier+Prime:wght@400;700&family=Josefin+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F5E8D0;
    --paper:#FBF6EC;
    --teal:#1C6E6E;
    --coral:#C8442D;
    --gold:#D9A441;
    --navy:#1E2A38;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--cream);
    background-image:
      radial-gradient(circle at 10% 15%, rgba(28,110,110,0.05) 0%, transparent 40%),
      radial-gradient(circle at 90% 85%, rgba(200,68,45,0.05) 0%, transparent 40%);
    color:var(--navy);
    font-family:'Courier Prime', monospace;
    min-height:100vh;
  }
  header{
    text-align:center;
    padding:22px 16px 14px;
    border-bottom:4px solid var(--navy);
    background:var(--paper);
    position:relative;
  }
  header::after{
    content:"";
    position:absolute;
    left:0;right:0;bottom:-4px;
    height:4px;
    background:repeating-linear-gradient(90deg, var(--coral) 0 24px, var(--gold) 24px 48px);
  }
  h1{
    font-family:'Alfa Slab One', serif;
    font-size:clamp(24px,5vw,42px);
    color:var(--coral);
    margin:0 0 4px;
    text-shadow:2px 2px 0 var(--navy);
    letter-spacing:1px;
  }
  header p{
    font-family:'Josefin Sans', sans-serif;
    color:var(--teal);
    margin:0;
    font-weight:600;
    letter-spacing:2px;
    text-transform:uppercase;
    font-size:13px;
  }
  .wrap{
    max-width:1180px;
    margin:0 auto;
    padding:20px 16px 100px;
  }
  .stage{
    display:grid;
    grid-template-columns: 1.1fr 0.9fr;
    gap:18px;
  }
  @media (max-width:860px){
    .stage{grid-template-columns:1fr;}
  }
  .panel{
    background:var(--paper);
    border:3px solid var(--navy);
    border-radius:4px;
    box-shadow:6px 6px 0 rgba(30,42,56,0.15);
  }
  .panel-label{
    font-family:'Josefin Sans', sans-serif;
    font-weight:700;
    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
    background:var(--navy);
    color:var(--paper);
    padding:6px 12px;
  }
  #textOut{
    padding:18px 20px;
    height:420px;
    overflow-y:auto;
    line-height:1.55;
    font-size:14.5px;
  }
  #textOut .loc-name{
    font-family:'Alfa Slab One', serif;
    color:var(--coral);
    font-size:19px;
    margin:0 0 4px;
  }
  #textOut .loc-date{
    color:var(--teal);
    font-family:'Josefin Sans', sans-serif;
    font-weight:600;
    font-size:12px;
    letter-spacing:1px;
    margin-bottom:12px;
    display:block;
  }
  #textOut .entry{margin-bottom:16px; padding-bottom:14px; border-bottom:1px dashed rgba(30,42,56,0.25);}
  #textOut .cmd-echo{color:var(--teal); font-weight:700;}
  #textOut .cmd-echo::before{content:"> ";}
  .img-frame{
    padding:14px;
  }
  .postcard{
    border:2px solid var(--navy);
    background:#fff;
    padding:8px;
    box-shadow:0 0 0 6px var(--paper), 0 0 0 7px var(--navy);
  }
  .postcard img{
    width:100%;
    display:block;
    aspect-ratio: 8/5;
    object-fit:cover;
    background:repeating-linear-gradient(45deg, #eee, #eee 10px, #e2e2e2 10px, #e2e2e2 20px);
  }
  .caption{
    font-family:'Josefin Sans', sans-serif;
    font-size:11px;
    color:var(--navy);
    text-align:center;
    margin-top:8px;
    font-style:italic;
    opacity:0.75;
  }
  .prompt-box{
    margin:10px 14px 14px;
    padding:10px 12px;
    background:rgba(28,110,110,0.06);
    border:1px dashed var(--teal);
    border-radius:3px;
    font-size:11.5px;
    color:var(--teal);
    max-height:110px;
    overflow-y:auto;
  }
  .counter{
    margin-top:18px;
    background:var(--navy);
    color:var(--paper);
    border-radius:4px;
    padding:14px 18px;
    display:flex;
    flex-wrap:wrap;
    gap:22px;
    align-items:center;
    justify-content:space-between;
  }
  .wallet{
    font-family:'Alfa Slab One', serif;
    font-size:20px;
    color:var(--gold);
  }
  .wallet span{font-family:'Courier Prime',monospace; font-size:14px; color:var(--paper); margin-left:6px;}
  .tickets{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
  }
  .saveRow{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .saveRow .qbtn{padding:8px 12px; font-size:11px;}
  .ticket{
    font-family:'Alfa Slab One', serif;
    width:34px;height:46px;
    border-radius:3px;
    display:flex;align-items:center;justify-content:center;
    font-size:16px;
    position:relative;
    border:2px dashed var(--paper);
  }
  .ticket.A{background:#7A8B99;}
  .ticket.B{background:#3E8E7E;}
  .ticket.C{background:var(--teal);}
  .ticket.D{background:var(--coral);}
  .ticket.E{background:var(--gold); color:var(--navy);}
  .ticket .count{
    position:absolute; bottom:-9px; right:-6px;
    background:var(--paper); color:var(--navy);
    font-family:'Josefin Sans',sans-serif;
    font-size:10px; font-weight:700;
    border-radius:50%; width:16px;height:16px;
    display:flex;align-items:center;justify-content:center;
    border:1px solid var(--navy);
  }
  .cmdRow{
    display:flex;
    gap:10px;
    margin-top:18px;
  }
  #cmdInput{
    flex:1;
    font-family:'Courier Prime', monospace;
    font-size:15px;
    padding:12px 14px;
    border:3px solid var(--navy);
    border-radius:4px;
    background:var(--paper);
    color:var(--navy);
  }
  #cmdInput:focus{outline:2px solid var(--coral); outline-offset:1px;}
  button{
    font-family:'Josefin Sans', sans-serif;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
    font-size:13px;
    background:var(--coral);
    color:var(--paper);
    border:3px solid var(--navy);
    border-radius:4px;
    padding:0 20px;
    cursor:pointer;
  }
  button:hover{background:var(--navy);}
  .quickmenu{
    margin-top:12px;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .qbtn{
    background:var(--teal);
    font-size:11px;
    padding:7px 12px;
  }
  .qbtn:hover{background:var(--navy);}
  .hint{
    font-family:'Josefin Sans', sans-serif;
    font-size:11px;
    color:var(--navy);
    opacity:0.65;
    margin-top:8px;
    text-align:center;
  }
  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--teal); border-radius:4px;}
</style>
</head>
<body>

<header>
  <h1>DISNEYLAND</h1>
  <p>Town Square Edition · Saturday, June 17, 1967</p>
</header>

<div class="wrap">
  <div class="stage">
    <div class="panel">
      <div class="panel-label">Text Adventure Engine</div>
      <div id="textOut"></div>
    </div>
    <div class="panel">
      <div class="panel-label">Image Generation — Live Illustration</div>
      <div class="img-frame">
        <div class="postcard">
          <img id="sceneImg" src="" alt="Scene illustration loading">
        </div>
        <div class="caption" id="imgCaption">Rendering scene…</div>
      </div>
      <div class="prompt-box" id="promptBox"></div>
    </div>
  </div>

  <div class="counter">
    <div class="wallet">$ <span id="walletVal">5.00</span></div>
    <div class="tickets" id="ticketRow"></div>
    <div class="saveRow">
      <button class="qbtn" id="saveBtn" type="button">💾 Save</button>
      <button class="qbtn" id="loadBtn" type="button">📂 Load</button>
      <button class="qbtn" id="newBtn" type="button" style="background:var(--coral)">🔄 New Game</button>
    </div>
  </div>

  <div class="cmdRow">
    <input id="cmdInput" type="text" placeholder="Type a command… (try 'help')" autocomplete="off">
    <button id="goBtn">Go</button>
  </div>
  <div class="quickmenu" id="quickMenu"></div>
  <p class="hint">Free, no-key image generation via Pollinations.ai · All content hand-verified to June 1967 Disneyland</p>
</div>

/* ---------- SHOPS / CASH ITEMS ---------- */
const SHOP_ITEMS = {
  "churro": {price:0.15, desc:"a warm cinnamon-sugar churro"},
  "popcorn": {price:0.15, desc:"a bag of hot popcorn"},
  "taffy": {price:0.50, desc:"a box of Main Street saltwater taffy"},
  "mouse ears": {price:2.50, desc:"a pair of classic black Mickey Mouse ears, personalized while you wait"},
  "postcard": {price:0.10, desc:"a souvenir postcard of the castle"}
};

/* =========================================================
   ENGINE
   ========================================================= */

const textOut = document.getElementById('textOut');
const sceneImg = document.getElementById('sceneImg');
const imgCaption = document.getElementById('imgCaption');
const promptBox = document.getElementById('promptBox');
const walletVal = document.getElementById('walletVal');
const ticketRow = document.getElementById('ticketRow');
const quickMenu = document.getElementById('quickMenu');
const cmdInput = document.getElementById('cmdInput');

function renderCounter(){
  walletVal.textContent = fmt(state.wallet);
  ticketRow.innerHTML = '';
  ['A','B','C','D','E'].forEach(t=>{
    const d = document.createElement('div');
    d.className = 'ticket '+t;
    d.innerHTML = t + `<span class="count">${state.tickets[t]}</span>`;
    ticketRow.appendChild(d);
  });
}

function loadImage(prompt){
  const seed = Math.floor(Math.random()*100000);
  const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ". " + STYLE)}?width=800&height=500&seed=${seed}&nologo=true`;
  sceneImg.src = url;
  imgCaption.textContent = "Rendering scene…";
  sceneImg.onload = () => { imgCaption.textContent = "Illustration generated live via Pollinations.ai"; };
  sceneImg.onerror = () => { imgCaption.textContent = "Image service unreachable — check connection. Prompt is shown below regardless."; };
  promptBox.textContent = prompt + ". " + STYLE;
}

function printEntry(cmdText, html){
  const div = document.createElement('div');
  div.className = 'entry';
  let inner = '';
  if(cmdText) inner += `<div class="cmd-echo">${cmdText}</div>`;
  inner += html;
  div.innerHTML = inner;
  textOut.appendChild(div);
  textOut.scrollTop = textOut.scrollHeight;
}

function renderLocation(key, cmdEcho){
  const loc = LOCATIONS[key];
  state.location = key;
  state.visited.add(key);
  const html = `<p class="loc-name">${loc.name}</p><span class="loc-date">Disneyland · June 17, 1967</span><p>${loc.text()}</p>` + (loc.ride ? `<p><em>Attraction available here — try "ride" (${loc.ride.ticket} ticket).</em></p>` : '');
  printEntry(cmdEcho, html);
  loadImage(loc.img);
  buildQuickMenu(loc);
}

function buildQuickMenu(loc){
  quickMenu.innerHTML = '';
  Object.keys(loc.exits).forEach(dir=>{
    const b = document.createElement('button');
    b.className = 'qbtn';
    b.textContent = dir==='back' ? '← Back' : 'Go: '+dir;
    b.onclick = () => runCommand(dir==='back' ? 'back' : 'go '+dir);
    quickMenu.appendChild(b);
  });
  if(loc.ride){
    const b = document.createElement('button');
    b.className = 'qbtn';
    b.style.background = 'var(--coral)';
    b.textContent = 'Ride ('+loc.ride.ticket+' ticket)';
    b.onclick = () => runCommand('ride');
    quickMenu.appendChild(b);
  }
  const look = document.createElement('button');
  look.className = 'qbtn';
  look.textContent = 'Look Around';
  look.onclick = () => runCommand('look');
  quickMenu.appendChild(look);
}

function doRide(){
  const loc = LOCATIONS[state.location];
  if(!loc.ride){
    printEntry('ride', `<p>There's no attraction to board here.</p>`);
    return;
  }
  const t = loc.ride.ticket;
  if(state.tickets[t] <= 0){
    printEntry('ride', `<p>You check your ticket book — you're out of ${t} coupons. A cast member points you back toward City Hall or a ticket booth on Main Street to buy a new book (Deluxe 10-Ride, $3.25) if you'd like more.</p>`);
    return;
  }
  state.tickets[t]--;
  renderCounter();

  if(loc.ride.transportTo){
    printEntry('ride', `<p>You tear a ${t} coupon from your book and hand it to the attendant. The turnstile clicks. You board <strong>${loc.ride.name}</strong>...</p><p>${loc.text()}</p>`);
    loadImage(loc.img);
    renderLocation(loc.ride.transportTo, null);
    return;
  }

  printEntry('ride', `<p>You tear a ${t} coupon from your book and hand it to the attendant. The turnstile clicks. You board <strong>${loc.ride.name}</strong>...</p><p>${loc.text()}</p><p><em>What a ride! You step off back at the loading area, coupon spent, memory made.</em></p>`);
  loadImage(loc.img);
}

function doBuyTickets(){
  if(state.wallet < 3.25){
    printEntry('buy tickets', `<p>You count your cash — only $${fmt(state.wallet)}. Not quite enough for a new Deluxe 10-Ride book at $3.25.</p>`);
    return;
  }
  state.wallet -= 3.25;
  state.tickets.A += 3; state.tickets.B += 2; state.tickets.C += 2; state.tickets.D += 2; state.tickets.E += 1;
  renderCounter();
  printEntry('buy tickets', `<p>You hand over $3.25 for a fresh Deluxe 10-Ride ticket book — 3 A's, 2 B's, 2 C's, 2 D's, and a single precious E coupon, still smelling of fresh ink.</p>`);
}

function doBuy(item){
  const key = item.toLowerCase().trim();
  const loc = LOCATIONS[state.location];
  const localItems = loc.shopItems || {};
  const found = localItems[key] || SHOP_ITEMS[key];
  if(!found){
    const avail = [...Object.keys(localItems), ...Object.keys(SHOP_ITEMS)];
    printEntry('buy '+item, `<p>Nothing by that name here. Available nearby: ${avail.join(', ')}. Type "shop" to see prices.</p>`);
    return;
  }
  if(state.wallet < found.price){
    printEntry('buy '+item, `<p>You reach for your wallet — only $${fmt(state.wallet)} left, not enough for ${found.desc} ($${fmt(found.price)}).</p>`);
    return;
  }
  state.wallet -= found.price;
  renderCounter();
  printEntry('buy '+item, `<p>You buy ${found.desc} for $${fmt(found.price)}. Cash remaining: $${fmt(state.wallet)}.</p>`);
}

function doShopList(){
  const loc = LOCATIONS[state.location];
  const merged = {...SHOP_ITEMS, ...(loc.shopItems||{})};
  const lines = Object.entries(merged).map(([k,v])=>`<strong>${k}</strong> — $${fmt(v.price)} (${v.desc})`).join('<br>');
  printEntry('shop', `<p>For sale here:<br>${lines}</p>`);
}

function doLook(){
  const loc = LOCATIONS[state.location];
  printEntry('look', `<p class="loc-name">${loc.name}</p><p>${loc.text()}</p>`);
  loadImage(loc.img);
}

function doHelp(){
  printEntry('help', `<p><strong>Commands:</strong> look · go [place] · back · ride · buy tickets · buy [item] · shop · inventory · save · load · new game · help<br>
  Street vendor items (available almost everywhere): churro, popcorn, taffy, mouse ears, postcard.<br>
  Some locations (shops, cinema) sell their own goods — type "shop" once there to see the list.<br>
  Or just tap the buttons below the input box.</p>`);
}

function saveGame(){
  try{
    const data = {wallet:state.wallet, tickets:state.tickets, location:state.location};
    localStorage.setItem('dl1967save', JSON.stringify(data));
    printEntry('save', `<p>Your afternoon is tucked safely away — wallet, ticket book, and location have been saved to this browser.</p>`);
  }catch(e){
    printEntry('save', `<p>Couldn't save — this browser may be blocking local storage.</p>`);
  }
}

function loadGame(){
  try{
    const raw = localStorage.getItem('dl1967save');
    if(!raw){ printEntry('load', `<p>No saved visit found on this browser yet.</p>`); return; }
    const data = JSON.parse(raw);
    state.wallet = data.wallet;
    state.tickets = data.tickets;
    renderCounter();
    renderLocation(data.location, null);
    printEntry('load', `<p>Welcome back — your saved afternoon has resumed.</p>`);
  }catch(e){
    printEntry('load', `<p>Couldn't read a saved visit from this browser.</p>`);
  }
}

function newGame(){
  state.wallet = 5.00;
  state.tickets = {A:3, B:2, C:2, D:2, E:1};
  state.visited = new Set();
  renderCounter();
  renderLocation('townSquare', null);
  printEntry('new game', `<p>A fresh morning begins — Town Square, June 17, 1967, 9:04 AM.</p>`);
}

function doInventory(){
  const tk = Object.entries(state.tickets).map(([k,v])=>`${v}×${k}`).join(', ');
  printEntry('inventory', `<p><strong>Wallet:</strong> $${fmt(state.wallet)} cash<br><strong>Ticket book:</strong> ${tk}</p>`);
}

function runCommand(raw){
  const cmd = raw.trim().toLowerCase();
  if(!cmd) return;
  const loc = LOCATIONS[state.location];

  if(cmd === 'look' || cmd === 'l'){ doLook(); return; }
  if(cmd === 'help' || cmd === 'h'){ doHelp(); return; }
  if(cmd === 'inventory' || cmd === 'i' || cmd === 'wallet'){ doInventory(); return; }
  if(cmd === 'ride' || cmd === 'board'){ doRide(); return; }
  if(cmd === 'buy tickets' || cmd === 'buy ticket book'){ doBuyTickets(); return; }
  if(cmd === 'shop' || cmd === 'buy list'){ doShopList(); return; }
  if(cmd === 'save'){ saveGame(); return; }
  if(cmd === 'load'){ loadGame(); return; }
  if(cmd === 'new game' || cmd === 'reset' || cmd === 'restart'){ newGame(); return; }
  if(cmd.startsWith('buy ')){ doBuy(cmd.slice(4)); return; }
  if(cmd === 'back'){
    if(loc.exits.back){ renderLocation(loc.exits.back, raw); }
    else { printEntry(raw, `<p>No way back from here.</p>`); }
    return;
  }
  if(cmd.startsWith('go ')){
    const dest = cmd.slice(3).trim();
    const key = loc.exits[dest];
    if(key){ renderLocation(key, raw); }
    else { printEntry(raw, `<p>You can't go that way from here. Try: ${Object.keys(loc.exits).join(', ')}.</p>`); }
    return;
  }
  // bare direction/place name typed directly
  if(loc.exits[cmd]){ renderLocation(loc.exits[cmd], raw); return; }

  printEntry(raw, `<p>The cast member tilts their head, unsure what you mean. Try "help" for a list of commands.</p>`);
}

document.getElementById('goBtn').onclick = () => {
  const v = cmdInput.value;
  cmdInput.value = '';
  runCommand(v);
};
cmdInput.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter'){
    const v = cmdInput.value;
    cmdInput.value = '';
    runCommand(v);
  }
});

document.getElementById('saveBtn').onclick = () => runCommand('save');
document.getElementById('loadBtn').onclick = () => runCommand('load');
document.getElementById('newBtn').onclick = () => {
  if(confirm('Start a brand new visit? This resets your wallet and ticket book (your saved game, if any, is untouched).')){
    runCommand('new game');
  }
};

/* ---------- INIT ---------- */
renderCounter();
renderLocation('townSquare', null);
</script>

</html>
